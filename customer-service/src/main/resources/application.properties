# New PostgreSQL configuration
# PostgreSQL is an external database server, so the service connects to it over JDBC.
# The host is configurable:
# - localhost when you run the service directly from your IDE on your machine
# - postgres when Docker Compose runs the service inside a container
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:customerdb}
# The PostgreSQL JDBC driver class.
spring.datasource.driver-class-name=org.postgresql.Driver
# These credentials match the values defined in docker-compose.yml.
spring.datasource.username=${DB_USERNAME:food_user}
spring.datasource.password=${DB_PASSWORD:food_password}

# Hibernate now generates PostgreSQL-friendly SQL instead of H2 SQL.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# update keeps existing tables and adjusts them when the entity model changes.
# This is friendlier for learning than create-drop because PostgreSQL data persists across restarts.
spring.jpa.hibernate.ddl-auto=update
# Wait for JPA/Hibernate to create tables before running data.sql inserts.
spring.jpa.defer-datasource-initialization=true
# Always run data.sql so the sample customer records are loaded.
spring.sql.init.mode=always

# The H2 browser console is not used with PostgreSQL.
# PostgreSQL is inspected with tools like psql, DBeaver, or IntelliJ Database tools.
