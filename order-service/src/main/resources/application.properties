spring.application.name=order-service
server.port=8083

# Previous H2 configuration
# H2 stored the order data only in memory inside the application process.
# spring.datasource.url=jdbc:h2:mem:orderdb
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=saketh
# spring.datasource.password=saketh
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console
# spring.jpa.hibernate.ddl-auto=create-drop

# New PostgreSQL configuration
# The order service now connects to an external PostgreSQL database.
# One shared PostgreSQL server is simpler to manage, while each microservice still gets its own database.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:orderdb}
# PostgreSQL JDBC driver used for the datasource connection.
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:food_user}
spring.datasource.password=${DB_PASSWORD:food_password}

# PostgreSQL dialect helps Hibernate generate SQL that matches PostgreSQL syntax.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# update keeps existing rows instead of dropping tables every time the service starts.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Run seed SQL only after Hibernate has prepared the schema.
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.format_sql=true

# Keep loading sample order data from data.sql for learning and Postman testing.
spring.sql.init.mode=always

# Kafka configuration
# localhost:29092 works from the host machine, while kafka:9092 works from Docker Compose containers.
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# We keep one topic to make the event flow beginner-friendly.
app.kafka.order-placed-topic=${ORDER_PLACED_TOPIC:order-placed}

# Docker Compose overrides INVENTORY_GRPC_ADDRESS with inventory-service:9091.
# localhost works only when order-service is running directly on your machine.
grpc.client.inventory-service.address=${INVENTORY_GRPC_ADDRESS:static://localhost:9091}
grpc.client.inventory-service.negotiationType=PLAINTEXT
