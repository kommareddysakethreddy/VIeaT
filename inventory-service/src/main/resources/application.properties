spring.application.name=inventory-service
server.port=8082

# Previous H2 configuration
# H2 lived only in memory, so inventory data was recreated every time the service restarted.
# spring.datasource.url=jdbc:h2:mem:inventorydb
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=saketh
# spring.datasource.password=saketh
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console
# spring.jpa.hibernate.ddl-auto=create-drop

# New PostgreSQL configuration
# PostgreSQL is a separate database server, which is closer to a real microservice setup.
# This URL points to the inventorydb database inside the shared PostgreSQL container.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:inventorydb}
# PostgreSQL JDBC driver used by Spring Data JPA.
spring.datasource.driver-class-name=org.postgresql.Driver
# Username and password are externalized so Docker Compose can supply them.
spring.datasource.username=${DB_USERNAME:food_user}
spring.datasource.password=${DB_PASSWORD:food_password}

# Tell Hibernate to generate PostgreSQL-specific SQL.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# update keeps tables between restarts, which matches PostgreSQL persistence better than create-drop.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Run data.sql after Hibernate has created or updated the tables.
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.format_sql=true

# Always execute seed data for this beginner-friendly example.
spring.sql.init.mode=always

# The H2 console is removed because PostgreSQL is not embedded inside the app.
grpc.server.port=9091
