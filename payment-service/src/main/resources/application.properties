spring.application.name=payment-service
server.port=8084

# PostgreSQL configuration
# payment-service stores its own payment records in paymentdb.
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:paymentdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:food_user}
spring.datasource.password=${DB_PASSWORD:food_password}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.open-in-view=false

# Kafka configuration
# localhost:29092 is convenient from the host machine.
# kafka:9092 is used by Docker Compose containers on the shared Docker network.
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
spring.kafka.consumer.group-id=payment-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.vm.paymentservice.dto
spring.kafka.consumer.properties.spring.json.value.default.type=com.vm.paymentservice.dto.OrderPlacedEvent

# Topic name is configurable, but we keep one simple topic for this proof of concept.
app.kafka.order-placed-topic=${ORDER_PLACED_TOPIC:order-placed}
