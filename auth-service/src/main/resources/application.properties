spring.application.name=auth-service
server.port=4000

# Previous H2 configuration
# H2 stored the auth data only in memory inside the auth-service process.
# That was easy to start with, but users disappeared when the service restarted.
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console
# spring.datasource.url=jdbc:h2:mem:testdb
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=admin_viewer
# spring.datasource.password=password
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.jpa.hibernate.ddl-auto=update

# New PostgreSQL configuration
# auth-service now stores login data in its own auth table inside PostgreSQL.
# localhost works when you run the service from your IDE on your machine.
# In Docker Compose, localhost must be replaced by the PostgreSQL service name, usually "postgres".
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:authdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:food_user}
spring.datasource.password=${DB_PASSWORD:food_password}

# PostgreSQL is an external database, so data survives service restarts.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
# Create/update tables first, then run data.sql if sample data exists.
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.jpa.open-in-view=false

# JWT secret must be long enough for HS256 signing.
# The environment variable lets Docker or your IDE provide a different value later.
app.jwt.secret=${APP_JWT_SECRET:change-this-demo-secret-key-to-at-least-32-bytes-long}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:3600000}
